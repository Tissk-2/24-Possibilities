<style>

            color: theme('colors.on-background');

            background-image: 
                radial-gradient(circle at 20% 30%, theme('colors.surface-container-high') 2px, transparent 2px),
                radial-gradient(circle at 80% 70%, theme('colors.surface-container-high') 2px, transparent 2px),
                linear-gradient(45deg, transparent 48%, theme('colors.surface-container') 49%, theme('colors.surface-container') 51%, transparent 52%);
            background-size: 100px 100px, 150px 150px, 200px 200px;
            opacity: 0.4;
        }

        .floating-card {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>

<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md text-body-md bg-background">
<!-- Background Pattern -->
<div class="absolute inset-0 math-pattern pointer-events-none"></div>
<!-- Decorative Floating Cards (Background) -->
<div class="absolute top-20 left-10 opacity-30 floating-card" style="animation-delay: 0s;">
<div class="w-16 h-16 bg-surface-variant rounded-lg flex items-center justify-center font-number-card text-number-card text-on-surface-variant shadow-sm border border-outline-variant/30">8</div>
</div>

                The ultimate mental math challenge. Use 4 numbers to make 24.
            </p>
</div>
<!-- Sample Game Display (Visual Anchor) -->
<div class="flex gap-md mb-xl p-md bg-surface-container rounded-xl shadow-sm border border-outline-variant/40">
<div class="w-16 h-16 md:w-20 md:h-20 bg-surface rounded-lg flex items-center justify-center font-number-card text-number-card text-on-surface shadow-[0_2px_4px_rgba(0,0,0,0.05)] border border-outline-variant/20">4</div>
<div class="w-16 h-16 md:w-20 md:h-20 bg-surface rounded-lg flex items-center justify-center font-number-card text-number-card text-on-surface shadow-[0_2px_4px_rgba(0,0,0,0.05)] border border-outline-variant/20">6</div>

</div>

<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/50"></div>
